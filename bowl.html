<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bowls – Pottery of the Soul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arizonia&family=Courgette&family=Fleur+De+Leah&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Stint+Ultra+Condensed&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="page.css" />
  </head>
  <body style="background-image: url(vasebk.jpg)">
    <header class="imgg" style="height: 105px">
      <img src="logoo.png" alt="logo" style="height: 100px; width: 100px" />
      <nav>
        <a href="index.html">Home</a>
        <a href="about .html">About</a>
        <a href="contact.html">Review</a>
        <a href="mes-commandes.html" style="position: relative">
          🛒 My Orders
          <span
            id="cart-badge"
            style="
              display: none;
              position: absolute;
              top: -8px;
              right: -14px;
              background: #a3001b;
              color: white;
              border-radius: 50%;
              width: 20px;
              height: 20px;
              font-size: 0.7rem;
              align-items: center;
              justify-content: center;
              font-family: sans-serif;
              font-weight: bold;
            "
            >0</span
          >
        </a>
      </nav>
    </header>

    <main>
      <div
        style="
          display: flex;
          align-items: center;
          gap: 10px;
          width: fit-content;
          margin: auto;
        "
      >
        <button onclick="move(-1)">⫷</button>
        <div class="carousel">
          <img src="bowl.jpg" class="active" />
          <img src="bowl2.jpg" />
          <img src="bowl3.jpg" />
          <img src="bowl4.jpg" />
          <img src="bowl5.jpg" />
          <div style="padding-left: 20px; text-align: center">
            <p id="text">$11.00</p>
            <button
              class="order-btn"
              data-id="2"
              data-name="Earth Bowl"
              data-price="11.00"
              data-image="bowl.jpg"
            >
              🛒 Add to Cart
            </button>
          </div>
        </div>
        <button onclick="move(1)">⫸</button>
      </div>
    </main>

    <footer><p>pottery of the soul ©</p></footer>

    <script src="script.js"></script>
    <script>
      const items = [
        { id: "23", price: "11.00", name: "Earth Bowl", image: "bowl.jpg" },
        { id: "24", price: "10.75", name: "Celadon Bowl", image: "bowl2.jpg" },
        { id: "25", price: "5.25", name: "Mini Bowl", image: "bowl3.jpg" },
        { id: "26", price: "9.25", name: "Bowl 4", image: "bowl4.jpg" },
        { id: "27", price: "6.99", name: "Bowl 5", image: "bowl5.jpg" },
      ];
      const imgs = document.querySelectorAll(".carousel img");
      const btn = document.querySelector(".order-btn");
      let i = 0;

      function move(dir) {
        imgs[i].classList.remove("active");
        i = (i + dir + imgs.length) % imgs.length;
        imgs[i].classList.add("active");
        // update text AND button data
        document.getElementById("text").textContent = "$" + items[i].price;
        btn.dataset.name = items[i].name;
        btn.dataset.price = items[i].price;
        btn.dataset.image = items[i].image;
        btn.dataset.id = i + 2; // product ids 2,3,4...
      }
    </script>
  </body>
</html>
