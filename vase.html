<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vases – Pottery of the Soul</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arizonia&family=Courgette&family=Fleur+De+Leah&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Stint+Ultra+Condensed&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="page.css" />
  </head>
  <body style="background-image: url(vasebkk.jpg)">
    <header class="imgg" style="height: 105px">
      <img src="logoo.png" alt="logo" style="height: 100px; width: 100px" />
      <nav>
        <a href="index.html">Home</a>
        <a href="about .html">About</a>
        <a href="contact.html">Review</a>
        <a href="mes-commandes.html" style="position: relative">
          🛒 My Orders
          <span
            id="cart-badge"
            style="
              display: none;
              position: absolute;
              top: -8px;
              right: -14px;
              background: #a3001b;
              color: white;
              border-radius: 50%;
              width: 20px;
              height: 20px;
              font-size: 0.7rem;
              align-items: center;
              justify-content: center;
              font-family: sans-serif;
              font-weight: bold;
            "
            >0</span
          >
        </a>
      </nav>
    </header>

    <main>
      <div
        style="
          display: flex;
          align-items: center;
          gap: 10px;
          width: fit-content;
          margin: auto;
        "
      >
        <button onclick="move(-1)">⫷</button>
        <div class="carousel">
          <img src="vase11.jpg" class="active" />
          <img src="vase1.jpg" />
          <img src="vase2.jpg" />
          <img src="vase3.jpg" />
          <img src="vase4.jpg" />
          <img src="vase5.jpg" />
          <img src="vase6.jpg" />
          <div style="padding-left: 20px; text-align: center">
            <p id="text">$25.00</p>
            <button
              class="order-btn"
              data-id="6"
              data-name="Tall Vase"
              data-price="25.00"
              data-image="vase11.jpg"
            >
              🛒 Add to Cart
            </button>
          </div>
        </div>
        <button onclick="move(1)">⫸</button>
      </div>
    </main>

    <footer><p>pottery of the soul ©</p></footer>

    <script src="script.js"></script>
    <script>
      const items = [
        { id: "1", price: "25.00", name: "Tall Vase", image: "vase11.jpg" },
        { id: "2", price: "32.55", name: "Round Vase", image: "vase1.jpg" },
        { id: "3", price: "19.25", name: "Vase 3", image: "vase2.jpg" },
        { id: "4", price: "20.25", name: "Vase 4", image: "vase3.jpg" },
        { id: "5", price: "35.75", name: "Vase 5", image: "vase4.jpg" },
        { id: "6", price: "28.55", name: "Vase 6", image: "vase5.jpg" },
        { id: "7", price: "32.00", name: "Vase 7", image: "vase6.jpg" },
      ];
      const imgs = document.querySelectorAll(".carousel img");
      const btn = document.querySelector(".order-btn");
      let i = 0;

      function move(dir) {
        imgs[i].classList.remove("active");
        i = (i + dir + imgs.length) % imgs.length;
        imgs[i].classList.add("active");
        document.getElementById("text").textContent = "$" + items[i].price;
        btn.dataset.name = items[i].name;
        btn.dataset.price = items[i].price;
        btn.dataset.image = items[i].image;
        btn.dataset.id = i + 6;
      }
    </script>
  </body>
</html>
